packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  '@prisma/engines': true
  core-js: true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: set this to true or false
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@prisma/engines'
  - core-js
  - esbuild
  - msw
  - prisma
  - sharp
  - unrs-resolver
