tasks:
  # TRACK 1: DOCUMENTATION
  - id: docs-vision-paper
    title: "Documentar Visão e Arquitetura do Sistema"
    assigned_to: documentation_writer
    prompt: |
      # Criar DOCUMENTO DE VISÃO do Projeto
      
      ## Objetivo
      Documentar a visão completa do sistema "Cabala dos Caminhos" com foco em:
      1. Propósito do projeto (guia de autoconhecimento espiritual)
      2. Arquitetura do sistema de correlações
      3. Decisões de design tomadas
      4. Roadmap de implementação
      
      ## Arquivo de Saída
      `./docs/VISION.md`
      
      ## Conteúdo Esperado
      
      ### 1. Propósito do Projeto
      - Sistema de autoconhecimento espiritual baseado em correlações
      - Tradições: Numerologia Cabalística, Odu (Ifá), Astrologia, Numerologia Tântrica
      - **Problema que resolve**: números sem compreensão, sistemas isolados, falta de explicação educativa
      
      ### 2. Arquitetura de Cálculos
      Documentar cada sistema:
      - **Numerologia Cabalística**: soma da data, reduz até 9 (exceto 11, 22, 33)
      - **Odu de Nascimento**: soma do dia + mês, se > 16 soma os dígitos
      - **Numerologia Tântrica**: baseada no nome + data,指向 chakras
      - **Astrologia**: signo solar baseado em data, elemento e planeta regente
      - **Correlações**: matriz de correlação entre todos os sistemas
      
      ### 3. Sistema de Correlações
      Exemplo concreto de correlação:
      ```
      Escorpião + Caminho de Vida 11 + Odu Alafia
      
      Escorpião (elemento Água) → intuição e profundidade emocional
      11 (número mestre) → espiritualidade elevada e intuição
      Alafia (Odu) → paz, saúde, novos começos
      
      CORRELAÇÃO: A intuição de Escorpião é amplificada pelo 11.
      A energia de Alafia traz paz para a profundidade emocional.
      
      INSIGHT: Pessoa com alta sensibilidade espiritual, pode ter
      dificuldade de aterramento (água + números mestres).
      ```
      
      ### 4. Decisões de Design
      - Tarot/Mesa Real NÃO devem ser algoritmos - sem propósito espiritual real
      - Dashboard simplificado (3-5 widgets principais)
      - Explicações integradas no conteúdo
      - Mobile-first para acesso cotidiano
      
      ### 5. Roadmap
      ```
      Fase 1: Correlation Engine Core ✅ Planejado
      Fase 2: Perfil Consolidado (per-page completo)
      Fase 3: Dashboard Refatorado (foco em clareza)
      Fase 4: Insights Diários Personalizados
      Fase 5: Preceitos e Orientações Dinâmicas
      ```
      
      ## Formato
      - Escrever em PORTUGUÊS BRASILEIRO
      - Usar markdown com elementos visuais
      - Incluir exemplos concretos
      - máximo 2000 palavras
      
    verified_by: general
    verify_prompt: |
      Verificar que o arquivo `./docs/VISION.md` foi criado com:
      1. Propósito do projeto claramente definido
      2. Arquitetura de cálculos documentada
      3. Sistema de correlações explicado com exemplo
