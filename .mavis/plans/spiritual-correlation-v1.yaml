      ### 2. `calculator.ts` - Funções de cálculo
      
      ```typescript
      import { CABALISTIC_NUMBERS, ODUS, ZODIAC_ELEMENTS } from './definitions';
      
      // Calcula soma dos dígitos de uma data
      function getDateSum(date: Date): number {
        const str = date.toISOString().split('T')[0].replace(/-/g, '');
        return str.split('').reduce((a, b) => a + parseInt(b), 0);
      }
      
      // Reduz ao número raiz (exceto números mestres)
      function reduceToRoot(num: number): number {
        if ([11, 22, 33].includes(num)) return num;
        if (num <= 9) return num;
        return reduceToRoot(String(num).split('').reduce((a, b) => a + parseInt(b), 0));
      }
      
      // Calcula caminho de vida cabalístico
      export function calculateCabalisticPath(birthDate: Date): {
        number: number;
        isMaster: boolean;
        description: string;
        characteristics: string[];
      } {
        const sum = getDateSum(birthDate);
        const reduced = reduceToRoot(sum);
        const info = CABALISTIC_NUMBERS[reduced] || CABALISTIC_NUMBERS[1];
        
        return {
          number: reduced,
          isMaster: [11, 22, 33].includes(reduced),
          description: info.description,
          characteristics: info.strengths
        };
      }
      
      // Calcula Odu de nascimento (Ifá)
      export function calculateBirthOdu(birthDate: Date): {
        odu: string;
        meaning: string;
        preceitos: string[];
        element: string;
      } {
        const day = birthDate.getDate();
        const month = birthDate.getMonth() + 1;
        let oduNumber = day + month;
        
        // Se > 16, soma os dígitos
        while (oduNumber > 16) {
          oduNumber = String(oduNumber).split('').reduce((a, b) => a + parseInt(b), 0);
        }
        
        const oduName = Object.keys(ODUS).find(k => ODUS[k].number === oduNumber) || 'Alafia';
        const odu = ODUS[oduName];
        
        return {
          odu: oduName,
          meaning: odu?.meaning || '能量_unknown',
          preceitos: odu?.preceitos || [],
          element: odu?.element || 'Terra'
        };
      }
      
      // Determina signo solar
      export function getZodiacSign(birthDate: Date): {
        sign: string;
        element: string;
        ruler: string;
      } {
        const month = birthDate.getMonth() + 1;
        const day = birthDate.getDate();
        
        // Lógica simplificada de signos
        if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) {
          return { sign: 'Escuroão', element: 'Agua', ruler: 'Plutão' };
        }
        if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) {
          return { sign: 'Aries', element: 'Fogo', ruler: 'Marte' };
        }
        // ... outros signos
        return { sign: 'Escuroão', element: 'Agua', ruler: 'Plutão' }; // default
      }
      ```
      
