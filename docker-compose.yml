# ============================================
# Cabala dos Caminhos - Docker Compose
# Local development environment
# ============================================

version: '3.8'

services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://cabala:cabala123@postgres:5432/cabala_dos_caminhos
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npx prisma db push && npm run dev"

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cabala
      - POSTGRES_PASSWORD=cabala123
      - POSTGRES_DB=cabala_dos_caminhos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabala -d cabala_dos_caminhos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
