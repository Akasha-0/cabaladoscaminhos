# PostHog Funnels — Akasha Portal
# -----------------------------------------------------------------------------
# Funnel definitions to be imported into PostHog (Insights → Funnels).
#
# Format mirrors PostHog's funnel YAML export schema (2026-06) — each funnel
# has a sequence of steps (event names), a conversion window, and metadata
# that surfaces in dashboards.
#
# How to apply:
#   1. PostHog UI: Insights → New → Funnel → paste steps OR import this file
#   2. PostHog API (when implemented):
#      scripts/apply-postHog-funnels.ts reads this file and POSTs to
#      /api/projects/:id/insights with type=funnel
#
# Conventions:
#   - Each funnel has a stable `id` (slug) — used in dashboards/alerts
#   - `conversion_window_days` defaults to 7 unless overridden
#   - `target_conversion_pct` is the goal (alerts if below)
#   - Steps reference event names from src/lib/analytics/events.ts
#     (snake_case — keep this file in sync)

version: 1
project: cabaladoscaminhos
generated_at: "2026-06-27"

# ─── 1. New user activation ────────────────────────────────────────────────
# From signup to first post. The single most important funnel — measures
# whether onboarding produces real value.

- id: new_user_activation
  name: "Signup → Onboarding → First Post"
  description: >
    Mede o caminho crítico de novos usuários: criar conta, completar
    onboarding, publicar primeiro post. Conversão esperada: ≥40% completam
    esse funil dentro de 7 dias.
  steps:
    - event: auth_signed_up
      label: "Criar conta"
    - event: onboarding_step_completed
      label: "Completar onboarding"
      filters:
        properties:
          step: tutorial_done
    - event: content_post_created
      label: "Publicar primeiro post"
  conversion_window_days: 7
  target_conversion_pct: 40
  alert_below_pct: 25
  dashboard: activation
  owner_role: pm

# ─── 2. Top of funnel conversion ───────────────────────────────────────────
# Anonymous landing → email capture (waitlist). Defines marketing baseline.

- id: landing_to_waitlist
  name: "Landing → Waitlist"
  description: >
    Visitante da landing pública entra na lista de espera (captura de email
    para notificar quando o produto abrir). Útil pra avaliar copy da landing
    + canal de aquisição.
  steps:
    - event: $pageview
      label: "Visita landing"
      filters:
        properties:
          $current_url: https://cabala-dos-caminhos.vercel.app
    # NOTE: event below doesn't exist yet — TODO: implement
    # When added, uncomment + import into events.ts as type PageWaitlistJoined
    # - event: page_waitlist_joined
    #   label: "Entrou na waitlist"
  conversion_window_days: 1
  target_conversion_pct: 8
  alert_below_pct: 3
  dashboard: acquisition
  owner_role: pm
  note: >
    Segundo passo depende de implementar evento page_waitlist_joined.
    Por enquanto, este funil reporta apenas pageviews da landing.

# ─── 3. AI Chat stickiness ─────────────────────────────────────────────────
# Users who start an AI chat and reach "actually using it" (3+ messages).
# Measures Akasha IA's retention curve.

- id: ai_chat_stickiness
  name: "AI Chat Started → 3+ Messages"
  description: >
    Usuário abre o chat da Akasha IA e envia 3+ mensagens. Indica que a
    conversa gerou valor real (não foi só teste e saída). Meta: ≥40% dos
    que abrem o chat mandam 3+ mensagens.
  steps:
    - event: ai_chat_started
      label: "Abriu chat IA"
    - event: ai_message_sent
      label: "Enviou mensagem 1"
    - event: ai_message_sent
      label: "Enviou mensagem 2"
    - event: ai_message_sent
      label: "Enviou mensagem 3"
  conversion_window_days: 1
  target_conversion_pct: 40
  alert_below_pct: 20
  dashboard: ai_engagement
  owner_role: pm
  breakdown: source  # see which source converts best (home, article, etc)

# ─── 4. Content reader retention ───────────────────────────────────────────
# Visitor on an article page actually reads (≥30s). Indicates content quality.

- id: article_reader_retention
  name: "Article View → Read ≥30s"
  description: >
    Visitante abre artigo e fica ≥30 segundos (com scroll). Meta: ≥35% dos
    que abrem leem de verdade. Abaixo de 20% indica problema no conteúdo
    OU no snippet/teaser.
  steps:
    - event: $pageview
      label: "Abriu artigo"
      filters:
        properties:
          $pathname__icontains: /artigos/
    - event: content_article_read
      label: "Leu ≥30s"
      filters:
        properties:
          read_seconds__gte: 30
  conversion_window_days: 1
  target_conversion_pct: 35
  alert_below_pct: 20
  dashboard: content
  owner_role: curator

# ─── 5. NPS submission rate ────────────────────────────────────────────────
# Users who hit D+7 actually submit the NPS survey. Measures feedback-loop health.

- id: nps_submission_rate
  name: "D+7 Eligible → NPS Submitted"
  description: >
    Dos usuários que atingem 7 dias desde signup, quantos respondem o NPS
    (consented + saw widget + clicked submit). Meta: ≥30% submission rate.
    Abaixo disso, o widget não está engajando OU o timing está errado.
  steps:
    # Cohort: signed up ≥7 days ago (apply via PostHog cohort, not in steps)
    - event: auth_signed_up
      label: "Signup (D+7 cohort)"
      cohort_filter:
        # This is a filter hint — apply as PostHog cohort on the funnel
        description: "Signed up ≥7 days ago"
        type: behavioral
    - event: feedback_nps_submitted
      label: "Submeteu NPS"
  conversion_window_days: 7
  target_conversion_pct: 30
  alert_below_pct: 15
  dashboard: feedback_loop
  owner_role: pm
  note: >
    Aplicar como cohort: "auth_signed_up completed ≥7 days ago" → cross
    with feedback_nps_submitted. No PostHog UI, criar cohort primeiro e
    depois attach ao funil.

# ─── 6. Bug report → Resolution (operational) ───────────────────────────────
# Admin metric: bug reports get triaged and resolved.

- id: bug_report_resolution
  name: "Bug Open → Triaged → Resolved"
  description: >
    Tempo entre bug report aberto e resolução. Meta: 90% dos bugs com
    severity=critical resolvidos em ≤24h. 70% dos medium em ≤7 dias.
    Este funil é puramente operacional — útil para SLA report.
  steps:
    - event: feedback_bug_report_submitted
      label: "Report aberto"
    # Status changes tracked via admin server actions — these would need
    # custom events when admin toggles status (TODO: implement).
    # - event: feedback_bug_triaged
    # - event: feedback_bug_resolved
  conversion_window_days: 30
  target_conversion_pct: 100
  alert_below_pct: 80
  dashboard: ops
  owner_role: pm
  note: >
    Steps 2-3 dependem de implementar eventos feedback_bug_triaged /
    feedback_bug_resolved disparados pelos Server Actions em
    src/app/admin/feedback/actions.ts. Por enquanto, este funil é
    apenas "report foi aberto".

# ─── 7. Citation click-through (AI IA quality proxy) ───────────────────────
# When Akasha IA cites a source, does the user click it? High CTR = relevant citations.

- id: ai_citation_ctr
  name: "AI Chat → Citation Clicked"
  description: >
    Em conversas com Akasha IA, qual % dos turnos que retornaram citation
    resultaram em click? Meta: ≥25% (indica que as fontes estão relevantes
    e bem-contextualizadas). Abaixo de 10% pode indicar RAG ruim OU
    citação excessiva (exaustivamente citar tudo dilui o valor).
  steps:
    - event: ai_message_sent
      label: "Resposta da IA com citation"
      filters:
        properties:
          # server-side sets this when response includes citations
          has_citations: true
    - event: ai_citation_clicked
      label: "Citation clicada"
  conversion_window_days: 1
  target_conversion_pct: 25
  alert_below_pct: 10
  dashboard: ai_engagement
  owner_role: curator
  breakdown: source_type  # paper vs book vs tradition vs web vs community_post

# ─── 8. Re-engagement after notification ───────────────────────────────────
# User receives a notification, clicks it, returns to app within 30 min.

- id: notification_reengagement
  name: "Notification → Click → Active Session"
  description: >
    Usuário recebe notificação (push ou in-app), clica nela, e fica ativo
    (≥1 pageview) nos próximos 30 min. Meta: ≥15% click-through + ≥50%
    re-engaged after click.
  steps:
    - event: notification_received
      label: "Notificação entregue"
    - event: notification_clicked
      label: "Notificação clicada"
    - event: $pageview
      label: "Pageview pós-click"
      filters:
        properties:
          # PostHog time-based filter — pageview within 30 min of click
          session_duration__gte: 30
  conversion_window_days: 1
  target_conversion_pct: 8  # 15% click * 50% retained = ~8% overall
  alert_below_pct: 4
  dashboard: notifications
  owner_role: pm

# ─── Dashboards referenced ─────────────────────────────────────────────────

dashboards:
  activation:
    name: "Activation & Onboarding"
    description: "Métricas de novos usuários, conversão de onboarding, time-to-first-value."
    funnels: [new_user_activation]
    events_referenced: [auth_signed_up, onboarding_step_completed, content_post_created]

  acquisition:
    name: "Acquisition & Landing"
    description: "Visitantes anônimos → waitlist → signup."
    funnels: [landing_to_waitlist]

  ai_engagement:
    name: "Akasha IA — Engajamento"
    description: "Chat, citations, retention da feature IA."
    funnels: [ai_chat_stickiness, ai_citation_ctr]

  content:
    name: "Content Quality"
    description: "Leitura, retenção, citation graph do conteúdo."
    funnels: [article_reader_retention]

  feedback_loop:
    name: "Feedback Loop Health"
    description: "NPS submission, detratores, feature requests."
    funnels: [nps_submission_rate]
    events_referenced: [feedback_nps_submitted, feedback_feature_request_created]

  ops:
    name: "Operations"
    description: "Bug reports, SLOs, incident metrics."
    funnels: [bug_report_resolution]

  notifications:
    name: "Notifications"
    description: "Delivery, click-through, re-engagement."
    funnels: [notification_reengagement]

# ─── Cross-references ──────────────────────────────────────────────────────

event_definitions: src/lib/analytics/events.ts
feedback_loop_doc: docs/FEEDBACK-LOOP.md
