name: CI

# Badges disponíveis no README:
# ![CI](https://github.com/Akasha-0/cabaladoscaminhos/actions/workflows/ci.yml/badge.svg)

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancela runs anteriores em push novo do mesmo branch (economia de minutos)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Defaults só pra CI; em prod vem de GitHub Secrets/Vercel env
  NODE_ENV: test
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint + Type Check + Quality (rápido, roda primeiro)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # preciso do histórico completo pra eslint-plugin-import

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit --skipLibCheck

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm prettier --check "src/**/*.{ts,tsx,md,json}" --ignore-path .gitignore

  # ──────────────────────────────────────────────────────────────────
  # Testes unitários (Vitest) — Matrix Node 20 + 22 pra catching breakage
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run unit + integration tests
        run: pnpm vitest run --reporter=verbose --coverage

      - name: Upload coverage to Codecov
        if: matrix.node == '22' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────
  # Build Next.js — garante que app compila em prod
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Não precisa de DB real pra type-check do Prisma,
      # mas o generate precisa rodar antes do build
      - name: Prisma generate
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      - name: Build (Next.js production)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      - name: Upload .next build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: .next/
          retention-days: 7
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────
  # Required status checks summary (pra proteger main)
  # ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success ✓
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [lint, test, build]
    if: success()
    steps:
      - name: All checks passed
        run: |
          echo "✅ Lint OK"
          echo "✅ Tests OK (Node 20 + 22)"
          echo "✅ Build OK"
          echo "Pronto pra merge."