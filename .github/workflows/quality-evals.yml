name: Quality Evals

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch or PR (default: main)'
        required: false
        default: 'main'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'

jobs:
  quality-check:
    name: Run Quality Checks
    runs-on: ubuntu-latest
    outputs:
      lint_exit: ${{ steps.lint.outputs.exit_code }}
      test_exit: ${{ steps.test.outputs.exit_code }}
      build_exit: ${{ steps.build.outputs.exit_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint
        run: |
          npm run lint
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        id: test
        run: |
          npm run test:run
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run Build
        id: build
        run: |
          npm run build
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

  generate-report:
    name: Generate Report
    needs: quality-check
    runs-on: ubuntu-latest
    outputs:
      report_data: ${{ steps.generate.outputs.report_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Report JSON
        id: generate
        shell: bash
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Determine overall status
          LINT_OK=${{ needs.quality-check.outputs.lint_exit == '0' }}
          TEST_OK=${{ needs.quality-check.outputs.test_exit == '0' }}
          BUILD_OK=${{ needs.quality-check.outputs.build_exit == '0' }}
          
          if $LINT_OK && $TEST_OK && $BUILD_OK; then
            STATUS="pass"
          elif $TEST_OK; then
            STATUS="warn"
          else
            STATUS="fail"
          fi
          
          REPORT=$(cat <<EOF
          {
            "timestamp": "$TIMESTAMP",
            "workflow": "quality-evals",
            "trigger": "${{ github.event_name }}",
            "ref": "${{ github.ref }}",
            "status": "$STATUS",
            "checks": {
              "lint": {
                "status": $([ "${{ needs.quality-check.outputs.lint_exit }}" == "0" ] && echo "pass" || echo "fail"),
                "command": "npm run lint"
              },
              "test": {
                "status": $([ "${{ needs.quality-check.outputs.test_exit }}" == "0" ] && echo "pass" || echo "fail"),
                "command": "npm run test:run"
              },
              "build": {
                "status": $([ "${{ needs.quality-check.outputs.build_exit }}" == "0" ] && echo "pass" || echo "fail"),
                "command": "npm run build"
              }
            },
            "runner": {
              "os": "ubuntu-latest",
              "node_version": "${{ env.NODE_VERSION }}"
            }
          }
          EOF)
          
          echo "report_json=$REPORT" >> "$GITHUB_OUTPUT"
          echo "$REPORT" > quality-eval-report.json

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v7
        with:
          name: quality-eval-report-${{ github.run_number }}
          path: quality-eval-report.json
          retention-days: 30

  post-results:
    name: Post Results
    needs: [quality-check, generate-report]
    runs-on: ubuntu-latest
    steps:
      - name: Download Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: quality-eval-report-${{ github.run_number }}
          path: .
      
      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        run: |
          REPORT=$(cat quality-eval-report.json)
          
          # Extract values from JSON
          STATUS=$(echo "$REPORT" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          TIMESTAMP=$(echo "$REPORT" | grep -o '"timestamp": "[^"]*"' | cut -d'"' -f4)
          LINT_STATUS=$(echo "$REPORT" | grep -o '"lint".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          TEST_STATUS=$(echo "$REPORT" | grep -o '"test".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          BUILD_STATUS=$(echo "$REPORT" | grep -o '"build".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          
          # Status emoji
          case "$STATUS" in
            pass) EMOJI="✅" ;;
            warn) EMOJI="⚠️" ;;
            fail) EMOJI="❌" ;;
          esac
          
          COMMENT_BODY="## Quality Eval Report $EMOJI
          
          **Trigger:** ${{ github.event_name }}
          **Timestamp:** $TIMESTAMP
          **Status:** $STATUS | **Ref:** \`${{ github.ref }}\`
          
          ### Checks
          
          | Check | Status |
          |-------|--------|
          | ESLint | $LINT_STATUS |
          | Tests | $TEST_STATUS |
          | Build | $BUILD_STATUS |
          
          > Report generated by GitHub Actions Quality Evals"
          
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Issue on Failure
        if: needs.quality-check.result == 'failure'
        run: |
          REPORT=$(cat quality-eval-report.json)
          STATUS=$(echo "$REPORT" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          TIMESTAMP=$(echo "$REPORT" | grep -o '"timestamp": "[^"]*"' | cut -d'"' -f4)
          LINT_STATUS=$(echo "$REPORT" | grep -o '"lint".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          TEST_STATUS=$(echo "$REPORT" | grep -o '"test".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          BUILD_STATUS=$(echo "$REPORT" | grep -o '"build".*"status": "[^"]*"' | grep -o '"status": "[^"]*"' | head -1 | cut -d'"' -f4)
          
          ISSUE_BODY="## Quality Eval Failed ❌
          
          **Date:** $TIMESTAMP
          **Workflow:** quality-evals
          **Ref:** \`${{ github.ref }}\`
          
          ### Failed Checks
          
          | Check | Status |
          |-------|--------|
          | ESLint | $LINT_STATUS |
          | Tests | $TEST_STATUS |
          | Build | $BUILD_STATUS |
          
          Please review and fix the issues."
          
          gh issue create \
            --title "Quality Eval Failed - $TIMESTAMP" \
            --body "$ISSUE_BODY" \
            --label "automated,quality"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}