name: i18n

# ============================================================================
# i18n — Wave 33
# Roda o CLI check-i18n-coverage em todo PR.
# - Falha (exit 1) se pt-BR ou en < 80% cobertura
# - Warn (exit 2, ainda passa) se es < 60% (es é tertiário em Wave 33)
# ============================================================================

on:
  pull_request:
    paths:
      - "src/**"
      - "src/lib/i18n/**"
      - "scripts/check-i18n-coverage.mjs"
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "src/lib/i18n/**"

jobs:
  coverage:
    name: Cobertura i18n
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências (se houver package.json)
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          fi
        continue-on-error: true

      - name: Auditar cobertura i18n
        id: audit
        run: |
          node scripts/check-i18n-coverage.mjs --verbose
        continue-on-error: true

      - name: Salvar relatório JSON como artifact
        if: always()
        run: |
          mkdir -p artifacts
          node scripts/check-i18n-coverage.mjs --json > artifacts/i18n-coverage.json
          echo "Relatório salvo em artifacts/i18n-coverage.json"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-coverage-report
          path: artifacts/i18n-coverage.json
          if-no-files-found: ignore

      - name: Comentário no PR com cobertura
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('artifacts/i18n-coverage.json', 'utf8'));
            } catch (e) {
              console.log('No report found');
              return;
            }
            const lines = ['### 🌐 i18n Coverage Report\n'];
            lines.push('| Locale | Defined | Used | Matched | Coverage |');
            lines.push('|---|---|---|---|---|');
            for (const [locale, r] of Object.entries(report)) {
              const pct = (r.coverage * 100).toFixed(1) + '%';
              lines.push(`| ${locale} | ${r.definedKeys} | ${r.usedKeys} | ${r.matchedKeys} | ${pct} |`);
            }
            lines.push('\n_Cobertura mínima: pt-BR/en = 80%, es = 60% (Wave 33)._');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n')
            });

      - name: Falhar se pt-BR/en abaixo do threshold
        if: steps.audit.outcome == 'failure'
        run: |
          echo "❌ Cobertura i18n abaixo do threshold (80%) em locale primário."
          echo "Veja o log acima para detalhes."
          exit 1