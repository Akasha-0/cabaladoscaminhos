name: Performance Budgets

# Garante que o bundle gerado por `next build` esta dentro dos budgets definidos
# em `docs/PERFORMANCE-BUDGETS.md`. Falha o PR se:
#   - Maior chunk JS > 250 KB (raw)
#   - Total de chunks JS > 5 MB (raw)
#
# Comenta no PR com a tabela de top 5 maiores chunks para visibilidade.
# Nao bloqueia main se vier de branch `develop` ou `feat/**` direto (push)
# — somente PRs contra main. Schedules semanais em cron para catch de drift.

on:
  pull_request:
    branches: [main]
  schedule:
    # Toda segunda 06:30 UTC — corre apos o security audit (06:00).
    - cron: '30 6 * * 1'
  workflow_dispatch:

# Permite que o step de comentario escreva no PR.
permissions:
  contents: read
  pull-requests: write

# Reutiliza runs em push do mesmo PR (economia de minutos).
concurrency:
  group: perf-budgets-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  bundle-size:
    name: Bundle Size Budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Prisma generate e necessario antes do `next build` (o client
      # e gerado em node_modules e referenciado pelas rotas server).
      - name: Prisma generate
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      # Build de producao — gera .next/static/chunks/.
      - name: Build (Next.js production)
        run: pnpm build
        env:
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      # Step principal: roda o check. Exit 0 = dentro do budget,
      # exit 1 = budget estourado, exit 2 = erro de infra.
      - name: Check bundle size
        id: check
        run: pnpm check:bundle
        continue-on-error: true

      # Coleta o output para anexar ao comentario / artifact.
      - name: Save bundle report
        if: always()
        run: |
          mkdir -p perf-reports
          pnpm check:bundle > perf-reports/bundle-size.txt 2>&1 || true

      - name: Upload bundle report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: perf-reports/bundle-size.txt
          retention-days: 14
          if-no-files-found: warn

      # Comentario no PR com tabela de chunks. Usa sticky comment para
      # nao spammar o PR com comentarios a cada push.
      - name: Comment PR with bundle report
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: perf-budgets
          message: |
            ## 📦 Bundle Size Budget

            ${{ steps.check.outcome == 'success' && '✅ **DENTRO DO BUDGET** — pronto pra merge.' || '❌ **BUDGET ESTOURADO** — ver tabela abaixo.' }}

            <details>
            <summary>📊 Top 5 maiores chunks + resumo</summary>

            ```
            ${{ steps.check.outcome == 'success' && 'Ver artifact `bundle-size-report` na run.' || 'Ver artifact `bundle-size-report` na run para detalhes.' }}
            ```

            </details>

            **Budgets enforced** (definidos em `docs/PERFORMANCE-BUDGETS.md`):
            - Maior chunk JS: < 250 KB
            - Total chunks JS: < 5 MB

            **Como corrigir budget estourado:**
            1. Rode `pnpm build && pnpm check:bundle` local
            2. Identifique o chunk que estourou no top 5
            3. Procure imports nao-tree-shakeable, libs pesadas sem `dynamic()`
            4. Veja `docs/PERFORMANCE-BUDGETS.md` para o playbook completo

      # Falha o job se budget estourou. `continue-on-error: true` no step
      # permite que o comentario seja postado antes do fail.
      - name: Fail if budget exceeded
        if: steps.check.outcome == 'failure'
        run: |
          echo "❌ Bundle size budget exceeded."
          echo "   Ver artifact 'bundle-size-report' e comentario no PR para detalhes."
          echo "   Refs: docs/PERFORMANCE-BUDGETS.md"
          exit 1
