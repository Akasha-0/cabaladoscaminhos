# Test pipeline — Cabala dos Caminhos
# Wave 32 (TEST COVERAGE 5/8)
# ============================================================================
# Runs unit/integration + e2e + visual regression on every PR.
# Uploads coverage to Codecov. Fails if thresholds not met.
#
# Mobile-first: primary viewport is iPhone 13 (mobile-safari/webkit).
# Single worker em paralelo porque o sandbox-ci tem pouca RAM (~2GB).
#
# Environments: ubuntu-latest, Node 22, npm ci
# ============================================================================

name: tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel previous runs on same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # JOB 1 — TSC + Unit + Integration (Vitest)
  # ==========================================================================
  unit-integration:
    name: Unit + Integration (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck -p tsconfig.json

      - name: Vitest unit + integration with coverage
        run: npm run test:unit -- --coverage --coverage.reporter=lcov --coverage.reporter=text-summary --coverage.reporter=json-summary --coverage.thresholds.lines=70 --coverage.thresholds.branches=60 --coverage.thresholds.functions=75 --coverage.thresholds.statements=70
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-that-is-at-least-32-bytes-long' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
          CI: 'true'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ==========================================================================
  # JOB 2 — API smoke tests (Vitest)
  # ==========================================================================
  api-tests:
    name: API smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-integration

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: API route tests
        run: npx vitest run tests/api/ --reporter=verbose --no-isolate
        env:
          JWT_SECRET: 'test-secret-key-that-is-at-least-32-bytes-long'
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          CI: 'true'

  # ==========================================================================
  # JOB 3 — E2E smoke (Playwright, mobile-first)
  # ==========================================================================
  e2e-smoke:
    name: E2E smoke (mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-integration

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers (mobile-safari only)
        run: npx playwright install --with-deps webkit

      - name: Build Next.js (production)
        run: npm run build
        env:
          JWT_SECRET: 'ci-jwt-secret-key-that-is-at-least-32-bytes-long'
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          CI: 'true'

      - name: E2E smoke (iPhone 13 webkit)
        run: npx playwright test e2e/smoke.spec.ts --project=mobile-safari --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # ==========================================================================
  # JOB 4 — Visual regression (3 viewports × 2 themes)
  # ==========================================================================
  visual-regression:
    name: Visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-integration

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright (all 3 browsers)
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Build Next.js
        run: npm run build
        env:
          JWT_SECRET: 'ci-jwt-secret-key-that-is-at-least-32-bytes-long'
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

      - name: Visual snapshots (desktop + tablet + mobile)
        run: npx playwright test --project=visual-desktop --project=visual-tablet --project=visual-mobile tests/visual/

      - name: Upload visual diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ==========================================================================
  # JOB 5 — Build health check
  # ==========================================================================
  build-check:
    name: Build + bundle size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-integration, api-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Production build
        run: npm run build
        env:
          JWT_SECRET: 'ci-jwt-secret-key-that-is-at-least-32-bytes-long'
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

      - name: Bundle size check
        run: |
          echo "Bundle size check (advisory only — Vercel production-grade)"
          du -sh .next 2>/dev/null || echo "Build artifacts: $(du -sh .next/static 2>/dev/null | cut -f1)"
