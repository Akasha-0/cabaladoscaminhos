name: Vercel Preview Deploy

# Dispara preview deploy em cada PR e mantém comentário atualizado.
# Cleanup automático via `vercel-action` quando PR é fechado.

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview-url }}
      preview_id: ${{ steps.deploy.outputs.preview-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gera PRISMA client (Vercel build precisa)
      - name: Prisma generate
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Faz pull do project settings do Vercel e deploya em modo preview
      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --yes --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --yes --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          # Gera um preview-id único (PR number + commit SHA curto) pra cleanup
          echo "preview-id=pr-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: vercel-preview
          message: |
            🚀 **Preview deploy pronto!**

            | Item | Valor |
            |------|-------|
            | 🔗 URL | ${{ steps.deploy.outputs.preview-url }} |
            | 📦 Commit | `${{ github.event.pull_request.head.sha }}` |
            | ⏱️ Expira | Em 7 dias (Vercel cleanup automático) |

            > ⚠️ **Preview é público** — não commite secrets nem dados sensíveis pra testar nesse ambiente.

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    name: Cleanup Preview
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Remove stale PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: vercel-preview
          message: |
            🔒 **Preview encerrado** (PR fechado/merged).

            _O ambiente de preview foi derrubado automaticamente._
      # Vercel já faz cleanup do alias quando o PR fecha via git integration,
      # mas deixamos este step caso o deploy seja manual.