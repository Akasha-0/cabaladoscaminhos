version: 2

# ────────────────────────────────────────────────────────────────────
# Dependabot config — Akasha Portal
#
# Estratégia:
#   - npm: agrupa por patch/minor pra reduzir PR noise
#   - github-actions: semanal, agrupa por tipo
#   - Auto-label "auto-merge" pra patch/minor (CI cuida do resto)
#   - Major updates NUNCA recebem auto-merge (workflow auto-merge.yml rejeita)
# ────────────────────────────────────────────────────────────────────

updates:
  # ─── Dependências npm ─────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 10
    rebase-strategy: 'auto'
    # Espera PRs acumularem em vez de abrir 1 por dia
    grouping:
      # Patch + minor vão juntos (auto-merge)
      - dependency-type: 'production'
        update-types: ['minor', 'patch']
        groups:
          - name: 'npm production (patch/minor)'
      - dependency-type: 'development'
        update-types: ['minor', 'patch']
        groups:
          - name: 'npm dev (patch/minor)'
      # Major vai sozinho (precisa review)
      - dependency-type: 'production'
        update-types: ['major']
      - dependency-type: 'development'
        update-types: ['major']

    # Ignora pacotes que precisam de revisão manual
    ignore:
      # Next.js — major sempre precisa validar migração (App Router, RSC)
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      # React — major pode quebrar padrões de hydration
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      # TypeScript — strict mode pode pegar novos erros
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # Prisma — schema/ORM muda muito em major
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']

    labels:
      - 'dependencies'
      - 'auto-merge' # aplica label só pra patch/minor; major workflows ignoram
    assignees:
      - 'Akasha-0/owners' # ajusta pro seu time
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps(dev)'
      include: 'scope'

    # Limita quantos PRs antigos podem ficar abertos (evita lixo)
    open-pull-requests-limit: 8

  # ─── GitHub Actions versions ─────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'America/Sao_Paulo'
    rebase-strategy: 'auto'
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'ci'
      - 'auto-merge'
    # Agrupa tudo num PR único pra evitar 30 PRs de actions/checkout@v4→v5
    groups:
      github-actions-bumps:
        patterns:
          - '*'

# ────────────────────────────────────────────────────────────────────
# Segurança — ativar alertas de vulnerability via Dependabot alerts
# (configurar via GitHub repo settings → Code security)
# ────────────────────────────────────────────────────────────────────