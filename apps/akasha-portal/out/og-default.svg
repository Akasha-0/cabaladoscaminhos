<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1025"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#d4a520"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Star glow -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#fbbf24" opacity="0.6" filter="url(#starGlow)"/>
  <circle cx="250" cy="150" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="400" cy="60" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="550" cy="120" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="700" cy="50" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="850" cy="100" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="1000" cy="70" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="1100" cy="140" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="180" cy="200" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="320" cy="250" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="500" cy="180" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="680" cy="220" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="820" cy="190" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="950" cy="240" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="1050" cy="200" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="150" cy="350" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="280" cy="400" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="420" cy="320" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="580" cy="380" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="780" cy="350" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="920" cy="400" r="1.5" fill="#fbbf24" opacity="0.4"/>
  <circle cx="1080" cy="320" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="80" cy="450" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="200" cy="500" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="350" cy="480" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="500" cy="520" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="650" cy="470" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="800" cy="510" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="950" cy="460" r="1.5" fill="#fbbf24" opacity="0.4"/>
  <circle cx="1100" cy="500" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="120" cy="550" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="280" cy="580" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="450" cy="560" r="1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="620" cy="590" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="780" cy="550" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="950" cy="580" r="1" fill="#fbbf24" opacity="0.3"/>
  <circle cx="1100" cy="550" r="1.5" fill="#fbbf24" opacity="0.5"/>
  
  <!-- Central glow orb -->
  <ellipse cx="600" cy="315" rx="300" ry="200" fill="#fbbf24" opacity="0.03"/>
  
  <!-- Logo/Icon -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <path d="M0 -50 L15 -15 L50 -15 L20 10 L30 45 L0 25 L-30 45 L-20 10 L-50 -15 L-15 -15 Z" 
          fill="url(#goldGrad)" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="serif" font-size="72" font-weight="bold" fill="#fbbf24">
    Cabala dos Caminhos
  </text>
  
  <!-- Divider -->
  <line x1="350" y1="360" x2="850" y2="360" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#94a3b8">
    Tecnologia Sagrada de Alinhamento Espiritual
  </text>
  
  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#64748b">
    Correlacionando Cabala • Ifá • Astrologia • Numerologia
  </text>
  
  <!-- Bottom badge -->
  <g transform="translate(600, 550)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fbbf24" opacity="0.8">
      cabaladoscaminhos.com
    </text>
  </g>
