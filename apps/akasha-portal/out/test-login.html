<!doctype html>
<html>
  <head>
    <title>Cabala - Teste</title>
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        background: #1e293b;
        padding: 2rem;
        border-radius: 1rem;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      h1 {
        color: #fbbf24;
        margin-bottom: 1rem;
      }
      p {
        color: #94a3b8;
        margin-bottom: 1rem;
      }
      button {
        padding: 1rem 2rem;
        font-size: 1.2rem;
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      button:hover {
        background: #6d28d9;
      }
      .result {
        margin-top: 2rem;
        padding: 1rem;
        background: #064e3b;
        border-radius: 0.5rem;
        display: none;
      }
      .result.show {
        display: block;
      }
      .success {
        color: #4ade80;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>✦ CABALA ✦</h1>
      <p>Teste de Login</p>

      <button id="testBtn" onclick="runTest()">TESTAR LOGIN</button>

      <div id="result" class="result">
        <p class="success" id="resultText"></p>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem; color: #64748b">
        Se você está lendo isso, a página carregou!<br />
        Clique "TESTAR LOGIN" para continuar.
      </p>
    </div>

    <script>
      function runTest() {
        var result = document.getElementById('result');
        var text = document.getElementById('resultText');

        // Simulate login
        localStorage.setItem('test', 'ok');

        // Show result
        result.classList.add('show');
        text.textContent = '✅ Login funcionou! localStorage está funcionando!';

        // After 2 seconds, show dashboard
        setTimeout(function () {
          document.body.innerHTML =
            '<div class="box"><h1>✦ DASHBOARD ✦</h1><p class="success">✅ VOCÊ ESTÁ NO DASHBOARD!</p><p style="margin-top:1rem;color:#94a3b8;">O sistema está funcionando.</p><button onclick="logout()" style="margin-top:2rem;background:#dc2626;">SAIR</button></div>';
        }, 2000);
      }

      function logout() {
        localStorage.removeItem('test');
        location.reload();
      }
    </script>
  </body>
</html>
