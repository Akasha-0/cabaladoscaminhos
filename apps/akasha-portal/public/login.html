<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { margin: 0; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
    .box { background: #1e293b; padding: 2rem; border-radius: 1rem; text-align: center; }
    h1 { color: #fbbf24; }
    p { color: #94a3b8; }
    input { width: 100%; padding: 1rem; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 0.5rem; margin-bottom: 1rem; box-sizing: border-box; }
    button { width: 100%; padding: 1rem; background: #7c3aed; color: white; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>CABALA</h1>
    <p>Acesse</p>
    <form action="/api/auth/login-form" method="POST">
      <input type="email" name="email" value="demo@cabala.com">
      <input type="password" name="password" value="Demo123456">
      <button type="submit">ENTRAR</button>
    </form>
  </div>
</body>
</html>
