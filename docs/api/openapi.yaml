openapi: 3.0.3
info:
  title: Akasha Portal API
  version: 0.2.0
  summary: REST + SSE API for the Akasha Portal community platform.
  description: >-
    OpenAPI 3.0.3 spec covering **118+ active routes** under `/api/**` in the Akasha Portal monorepo.


    ## Conventions


    - **Auth:** Supabase JWT (Bearer) OR session cookie (`sb-<ref>-auth-token`).

    - **Pagination:** Cursor-based (`?cursor=<id>&limit=<n>`, default 20, max 100).

    - **Timestamps:** ISO 8601 UTC.

    - **IDs:** cuid2 (Prisma).

    - **Envelopes:**
      - Success: `{ data, meta: { timestamp, requestId, nextCursor?, total? } }`
      - Error:   `{ error: { code, message, details? }, meta: { timestamp, requestId } }`
    - **Rate limit:** 100 req/min global per IP; tighter per-route (see `/posts`, `/akashic/chat`, etc.).

    - **LGPD:** Consent OBRIGATÓRIO em signup, forgot, beta-accept, exportação de dados pessoais (`GET
    /users/{id}/export`).


    ## Sacred-cultural compliance


    - Vocabulário pt-BR preservado: orixás, axé, Odu, Cigano Ramiro, Akasha, pemba, Ifá, Candomblé, Umbanda.

    - Banned-vocab em qualquer UI / API response / log (lista em `CONTRIBUTING.md`).


    ## Source of truth


    - Routes: `src/app/api/**/route.ts`

    - Validators: `src/lib/validators/*.ts` (zod)

    - Prisma schema: `prisma/schema.prisma`
  license:
    name: Proprietary
    url: https://akasha.com.br/legal/license
  contact:
    name: Akasha Engineering
    email: eng@akasha.com.br
    url: https://akasha.com.br
servers:
  - url: http://localhost:3000/api
    description: Local development
    variables:
      port:
        default: "3000"
        enum:
          - "3000"
          - "3001"
          - "3002"
  - url: https://staging.akasha.com.br/api
    description: Staging
  - url: https://akasha.com.br/api
    description: Production
tags:
  - name: Admin
    description: >-
      Admin-only operations: moderation, feature flags, beta invites, newsletter dispatch, user management. Requires
      admin role.
  - name: Akasha
    description: Akashic AI chat (token-bucket rate limit), feedback, and reading-records retrieval. SSE streaming endpoint.
  - name: Articles
    description: Biblioteca Akasha — peer-reviewed-style articles with evidence levels, traditions, bookmarks, read-progress.
  - name: Auth
    description: >-
      Authentication via Supabase: email/password login, registration, password reset, session status. Bearer JWT or
      cookie.
  - name: Beta
    description: "Beta-invite token lifecycle: validate token, accept invite, tracking pixel for email-open telemetry."
  - name: Consciousness
    description: Compute and persist consciousness insights derived from user activity.
  - name: Consent
    description: LGPD multi-layer consent grants / revocations across artifact categories (posts, analytics, marketing).
  - name: Cron
    description: >-
      Internal-only cron endpoints (publish scheduled posts, weekly digest, evolve consciousness, curate articles,
      process email queue).
  - name: Drafts
    description: Per-user post drafts + scheduled publishing. Author-only visibility until scheduled/published.
  - name: Email
    description: Transactional email triggers (welcome). Routing layer for Resend dispatch.
  - name: Events
    description: Community events (online/offline), RSVPs, participants.
  - name: Experiments
    description: A/B experiment bucket assignment (Labs feature).
  - name: Feature Flags
    description: Public + admin feature flags. List, detail, and admin toggle.
  - name: Groups
    description: Community groups per tradition. Members, posts, invites, group-scoped feed.
  - name: Health
    description: Liveness / readiness (no auth).
  - name: Mentorship
    description: "1-on-1 mentorship: request, accept, end, messaging. mentor/mentee roles."
  - name: Newsletter
    description: Subscribe, preferences, unsubscribe (LGPD Art. 18 right to opt-out).
  - name: Notifications
    description: In-app inbox + preferences + sacred-calendar + push (web-push). SSE stream for live inbox.
  - name: Oraculo
    description: "Astrologia + Numerologia + Mapa completo + Histórico (consumption gates: cost in pagar-consulta / credits)."
  - name: Payments
    description: "Stripe Connect escrow: charge, release, refund, transactions. Webhook signature-verified."
  - name: Posts
    description: "Community feed (cursor pagination): create, list, comment, reply, like, bookmark, schedule, publish."
  - name: Push
    description: Web-push public key + subscribe/unsubscribe.
  - name: Reactions
    description: Cross-content reactions (articles, posts).
  - name: Search
    description: Full-text + suggestions.
  - name: Upload
    description: Object upload to Supabase Storage with signed-URL validation.
  - name: Users
    description: Public profile + private self endpoints (bookmarks, history, follow graph, LGPD export / delete).
  - name: Waitlist
    description: Waitlist signup + invite acceptance.
