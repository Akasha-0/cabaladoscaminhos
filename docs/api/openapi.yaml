          properties:
            tradition:
              type: string
              maxLength: 50
            topics:
              type: array
              maxItems: 10
              items:
                type: string
                maxLength: 50
            locale:
              type: string
              enum:
                - pt
                - en
                - es
              default: pt
    AkashicFeedbackRequest:
      type: object
      required:
        - messageId
        - rating
      properties:
        messageId:
          type: string
          minLength: 10
          maxLength: 40
        rating:
          type: string
          enum:
            - UP
            - DOWN
        reason:
          type: string
          maxLength: 500
    ConsciousnessInsightRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          maxLength: 50
        payload:
          type: object
          additionalProperties: true
    ConsentGrantRequest:
      type: object
      required:
        - artifact
        - granted
      properties:
        artifact:
          type: string
          enum:
            - ANALYTICS
            - MARKETING
            - POSTS
            - PROFILE_PUBLIC
            - MENTORSHIP
        granted:
          type: boolean
        version:
          type: string
          maxLength: 20
    NotificationPreferences:
      type: object
      properties:
        like:
          type: boolean
        comment:
          type: boolean
        follow:
          type: boolean
        mention:
          type: boolean
        groupInvite:
          type: boolean
        groupPost:
          type: boolean
        articlePublished:
          type: boolean
        digestWeekly:
          type: boolean
        channel:
          type: string
          enum:
            - IN_APP
            - EMAIL
            - PUSH
    NotificationProfilePreferences:
      type: object
      properties:
        sacredCalendar:
          type: boolean
        smartSend:
          type: boolean
    CreateEventRequest:
      type: object
      required:
        - title
        - startsAt
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        online:
          type: boolean
        venue:
          type: string
          maxLength: 200
        tradition:
          type: string
          maxLength: 50
        capacity:
          type: integer
          minimum: 1
    RsvpRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - GOING
            - MAYBE
            - NOT_GOING
    ReactionRequest:
      type: object
      required:
        - targetType
        - targetId
        - kind
      properties:
        targetType:
          type: string
          enum:
            - POST
            - ARTICLE
            - COMMENT
        targetId:
          type: string
          minLength: 10
          maxLength: 40
        kind:
          type: string
          maxLength: 30
    CreateDraftRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
        title:
          type: string
          maxLength: 200
        scheduledFor:
          type: string
          format: date-time
        groupSlug:
          type: string
          maxLength: 120
    UpdateDraftRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
        title:
          type: string
          maxLength: 200
        scheduledFor:
          type: string
          format: date-time
    MentorshipRequestBody:
      type: object
      required:
        - mentorId
      properties:
        mentorId:
          type: string
          minLength: 10
          maxLength: 40
        topic:
          type: string
          maxLength: 200
        message:
          type: string
          maxLength: 2000
    MentorshipMessageBody:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
    MentorshipEndRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    OraculoAstrologiaRequest:
      type: object
      required:
        - birthDateTime
      properties:
        birthDateTime:
          type: string
          format: date-time
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        houseSystem:
          type: string
          enum:
            - PLACIDUS
            - WHOLE_SIGN
            - EQUAL
            - KOCH
          default: PLACIDUS
    OraculoNumerologiaRequest:
      type: object
      required:
        - fullName
        - birthDate
      properties:
        fullName:
          type: string
          maxLength: 200
        birthDate:
          type: string
          format: date
        system:
          type: string
          enum:
            - PITAGORICO
            - CABALISTICO
            - MARSELHA
          default: PITAGORICO
    OraculoMapaCompletoRequest:
      type: object
      required:
        - birthDateTime
      properties:
        birthDateTime:
          type: string
          format: date-time
        latitude:
          type: number
        longitude:
          type: number
    PaymentChargeRequest:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: integer
          minimum: 100
          description: Em centavos. Mínimo R$1,00.
        currency:
          type: string
          enum:
            - BRL
            - USD
          default: BRL
        description:
          type: string
          maxLength: 500
        metadata:
          type: object
          additionalProperties:
            type: string
            maxLength: 200
    PaymentRefundRequest:
      type: object
      required:
        - paymentIntentId
      properties:
        paymentIntentId:
          type: string
          maxLength: 120
        amount:
          type: integer
          minimum: 100
        reason:
          type: string
          maxLength: 200
    PaymentReleaseRequest:
      type: object
      required:
        - paymentIntentId
      properties:
        paymentIntentId:
          type: string
          maxLength: 120
    PushSubscribeRequest:
      type: object
      required:
        - endpoint
        - keys
      properties:
        endpoint:
          type: string
          format: uri
        keys:
          type: object
          required:
            - p256dh
            - auth
          properties:
            p256dh:
              type: string
              maxLength: 200
            auth:
              type: string
              maxLength: 64
    EmailSubscribeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          maxLength: 120
    NewsletterSubscribeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        groups:
          type: array
          items:
            type: string
            maxLength: 50
    NewsletterPreferences:
      type: object
      properties:
        weeklyDigest:
          type: boolean
        sacredCalendar:
          type: boolean
        productUpdates:
          type: boolean
    UnsubscribeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        reason:
          type: string
          maxLength: 200
    WaitlistSignupRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        tradicaoPrimaria:
          type: string
          maxLength: 50
        source:
          type: string
          maxLength: 200
    AcceptWaitlistInviteRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          maxLength: 128
    CreateFlagRequest:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          maxLength: 120
        value:
          type: object
          additionalProperties: true
    UpdateFlagRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: object
          additionalProperties: true
    FlagActionRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - ENABLE
            - DISABLE
            - ROLLOUT
            - KILL
        rolloutPercent:
          type: integer
          minimum: 0
          maximum: 100
    BanUserRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          maxLength: 500
        durationDays:
          type: integer
          minimum: 1
    NewsletterSendRequest:
      type: object
      required:
        - subject
        - html
      properties:
        subject:
          type: string
          maxLength: 200
        html:
          type: string
          maxLength: 100000
        segment:
          type: string
          maxLength: 100
    ModerationFlagRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - APPROVE
            - REMOVE
            - SHADOW_BAN
            - ESCALATE
        reason:
          type: string
          maxLength: 500
    ExperimentAssignRequest:
      type: object
      properties:
        overrideVariant:
          type: string
          maxLength: 30
    SearchRequest:
      type: object
      required:
        - q
      properties:
        q:
          type: string
          minLength: 1
          maxLength: 200
        type:
          type: string
          enum:
            - POST
            - ARTICLE
            - USER
            - GROUP
            - ALL
          default: ALL
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    GenericMutationRequest:
      type: object
      additionalProperties: true
      description: Generic mutation body. See route-specific docs for exact shape.
  responses:
    Unauthorized:
      description: Missing or invalid auth credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but lacks required role (mentor/admin).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Zod schema validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Segundos até poder tentar novamente.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor (last-seen id) para paginação. Omita na primeira chamada.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Tamanho da página (default 20, max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
