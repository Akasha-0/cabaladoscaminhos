components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Supabase JWT (`sb-<ref>-auth-token`). Alternative: session cookie set by `/api/auth/login`."
    CookieAuth:
      type: apiKey
      in: cookie
      name: sb-<ref>-auth-token
      description: Supabase session cookie. Name is dynamically suffixed by project ref.
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
            message:
              type: string
            details: {}
        meta:
          type: object
          required:
            - timestamp
          properties:
            timestamp:
              type: string
              format: date-time
            requestId:
              type: string
            nextCursor:
              oneOf:
                - type: string
                - type: "null"
            total:
              type: integer
              minimum: 0
            count:
              type: integer
              minimum: 0
    ApiSuccessGeneric:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: true
          description: Operation-specific payload.
        meta:
          type: object
          required:
            - timestamp
          properties:
            timestamp:
              type: string
              format: date-time
            requestId:
              type: string
            nextCursor:
              oneOf:
                - type: string
                - type: "null"
            total:
              type: integer
              minimum: 0
            count:
              type: integer
              minimum: 0
    User:
      type: object
      required:
        - id
        - email
        - createdAt
      properties:
        id:
          type: string
          minLength: 10
          maxLength: 40
        email:
          type: string
          format: email
          maxLength: 320
        name:
          type: string
          maxLength: 120
          nullable: true
        handle:
          type: string
          maxLength: 30
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          maxLength: 500
          nullable: true
