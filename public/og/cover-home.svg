<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d4a520"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- soft glow orbs -->
  <circle cx="100" cy="80" r="180" fill="#fbbf24" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1100" cy="540" r="220" fill="#a78bfa" opacity="0.14" filter="url(#glow)"/>
  <!-- border accent -->
  <rect x="32" y="32" width="1136" height="566" rx="24" fill="none" stroke="#fbbf24" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- branding -->
  <text x="80" y="160" font-family="Georgia, serif" font-size="28" fill="#fbbf24" letter-spacing="6">AKASHA PORTAL</text>
  <text x="80" y="280" font-family="Georgia, serif" font-size="84" font-weight="700" fill="url(#gold)">Comunidade Viva</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="84" font-weight="700" fill="url(#violet)">de Espiritualidade</text>
  <text x="80" y="460" font-family="system-ui, sans-serif" font-size="26" fill="#cbd5e1">16 tradições · IA curadora · Evidência + tradição</text>
  <text x="80" y="555" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">cabaladoscaminhos.com</text>
