<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="240" fill="url(#centerGlow)"/>
  <!-- Sefirot-inspired nodes -->
  <g transform="translate(600, 315)">
    <circle cx="0" cy="-180" r="20" fill="#fbbf24"/>
    <circle cx="-90" cy="-90" r="20" fill="#a78bfa"/>
    <circle cx="90" cy="-90" r="20" fill="#a78bfa"/>
    <circle cx="-90" cy="0" r="20" fill="#a78bfa"/>
    <circle cx="0" cy="0" r="24" fill="#fbbf24"/>
    <circle cx="90" cy="0" r="20" fill="#a78bfa"/>
    <circle cx="-90" cy="90" r="20" fill="#a78bfa"/>
    <circle cx="90" cy="90" r="20" fill="#a78bfa"/>
    <circle cx="0" cy="180" r="22" fill="#ec4899"/>
    <!-- connecting lines -->
    <line x1="0" y1="-180" x2="-90" y2="-90" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="0" y1="-180" x2="90" y2="-90" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="-90" y1="-90" x2="0" y2="0" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="90" y1="-90" x2="0" y2="0" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="0" y1="0" x2="-90" y2="90" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="0" y1="0" x2="90" y2="90" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="-90" y1="0" x2="0" y2="0" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="0" y1="0" x2="90" y2="0" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="-90" y1="90" x2="0" y2="180" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="90" y1="90" x2="0" y2="180" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
  </g>
  <text x="80" y="160" font-family="Georgia, serif" font-size="28" fill="#c4b5fd" letter-spacing="6">MESA AKÁSHICA</text>
  <text x="80" y="500" font-family="Georgia, serif" font-size="64" font-weight="700" fill="url(#violet)">Jogo oracular</text>
  <text x="80" y="565" font-family="Georgia, serif" font-size="64" font-weight="700" fill="url(#violet)">de 36 casas</text>
</svg>