  <text x="320" y="370" font-family="Georgia, serif" font-size="80" font-weight="700" fill="url(#pink)">por tradição</text>
  <text x="320" y="440" font-family="system-ui, sans-serif" font-size="26" fill="#cbd5e1">Feed, conexões, mentoria 1-on-1</text>
  <text x="80" y="555" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">cabaladoscaminhos.com/community</text>
