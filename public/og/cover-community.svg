      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="160" cy="500" r="220" fill="#ec4899" opacity="0.14" filter="url(#glow)"/>
  <!-- People cluster icon -->
  <g transform="translate(80, 220)">
    <circle cx="60" cy="80" r="32" fill="#fbbf24" opacity="0.85"/>
    <circle cx="140" cy="60" r="36" fill="#a78bfa"/>
    <circle cx="60" cy="180" r="36" fill="#34d399"/>
    <circle cx="140" cy="180" r="32" fill="#ec4899"/>
