    <line x1="60" y1="80" x2="140" y2="60" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="60" y1="80" x2="60" y2="180" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="140" y1="60" x2="140" y2="180" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4 4"/>
