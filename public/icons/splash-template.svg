<?xml version="1.0" encoding="UTF-8"?>
<!--
  Akasha Portal Splash Screen Template (Wave 24)
  ---
  This SVG is the design source for the splash PNGs referenced in
  manifest.json and apple-touch-startup-image meta tags.

  To generate actual PNGs at install time, use:
    npx pwa-asset-generator public/icons/splash-template.svg public/icons/
  (generates splash-*.png at all standard iOS resolutions)

  Design: midnight navy (#0a0a0f) + gold gradient (brand) + centered
  symbolic ouroboros/star mark. Black background avoids white flash.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1334" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Mark (centered, 240px from top) -->
  <g transform="translate(375 567)">
    <!-- Outer ring -->
    <circle r="120" fill="none" stroke="url(#mark)" stroke-width="2" opacity="0.5"/>
    <!-- Inner symbol (8-pointed star) -->
    <path
      d="M 0,-80 L 22,-22 L 80,0 L 22,22 L 0,80 L -22,22 L -80,0 L -22,-22 Z"
      fill="url(#mark)"
      opacity="0.95"
    />
    <!-- Center dot -->
    <circle r="8" fill="#0a0a0f"/>
  </g>

  <!-- Title -->
  <text
    x="375"
    y="780"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="42"
    font-weight="600"
    fill="#fbbf24"
    letter-spacing="0.2em"
  >AKASHA</text>
  <text
    x="375"
    y="830"
    text-anchor="middle"
    font-family="Raleway, system-ui, sans-serif"
    font-size="18"
    fill="#a78bfa"
    letter-spacing="0.3em"
    opacity="0.8"
  >PORTAL</text>

  <!-- Loading dots -->
  <g transform="translate(375 900)">
    <circle cx="-24" cy="0" r="4" fill="#fbbf24" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="24" cy="0" r="4" fill="#fbbf24"/>
  </g>
</svg>
