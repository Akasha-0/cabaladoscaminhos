<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbbf24">
  <meta name="description" content="Você está offline — Akasha Portal">
  <title>Offline — Akasha Portal</title>
  <style>
    /* ============================================================
       Minimal fallback styles — no external deps (must work offline)
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100vh;
      background: #0a0a0f;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .safe-area {
      /* iOS notch + Android nav bar */
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
    }

    main {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      background:
        radial-gradient(ellipse at top, rgba(251, 191, 36, 0.12), transparent 60%),
        radial-gradient(ellipse at bottom, rgba(124, 58, 237, 0.08), transparent 60%);
    }

    .icon {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      border-radius: 24px;
      background: linear-gradient(135deg, #fbbf24, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 60px rgba(251, 191, 36, 0.25);
      animation: float 4s ease-in-out infinite;
    }

    .icon svg {
      width: 48px;
      height: 48px;
      color: #0a0a0f;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .icon { animation: none; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      background: linear-gradient(135deg, #fbbf24, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #94a3b8;
      max-width: 28rem;
      margin: 0 0 2rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }

    button, a.btn {
      min-height: 48px;
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: transform 150ms ease, box-shadow 150ms ease;
      -webkit-user-select: none;
      user-select: none;
    }

    button:active, a.btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0a0a0f;
      box-shadow: 0 4px 20px rgba(251, 191, 36, 0.25);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status {
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .meta {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #475569;
    }

    /* Hide visually but keep accessible */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 380px) {
      h1 { font-size: 1.25rem; }
      p { font-size: 0.9375rem; }
      .icon { width: 80px; height: 80px; }
    }
  </style>
</head>
<body class="safe-area">
  <a href="#main" class="sr-only">Pular para conteúdo</a>
  <main id="main" role="main">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </div>

    <h1>Você está offline</h1>
    <p>
      A conexão com a internet foi perdida. Verifique sua rede e tente novamente —
      suas práticas espirituais continuam acessíveis quando voltar.
    </p>

    <div class="actions">
      <button class="btn-primary" type="button" onclick="window.location.reload()" aria-label="Tentar reconectar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
          <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
          <path d="M16 16h5v5"/>
        </svg>
        Tentar reconectar
      </button>
      <a href="/" class="btn btn-secondary" aria-label="Voltar para a página inicial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Voltar ao início
      </a>
    </div>

    <div class="status" role="status" aria-live="polite">
      Sem conexão
    </div>

    <div class="meta">
      Akasha Portal · Modo Offline
    </div>
  </main>

  <script>
    // Auto-retry when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
